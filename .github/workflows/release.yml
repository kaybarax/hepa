name: Release Binaries

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to publish, for example v1.0.0"
        required: true
        default: "v1.0.0"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            target: aarch64-apple-darwin
            binary_ext: ""
            archive_ext: tar.gz
          - os: macos-15-intel
            target: x86_64-apple-darwin
            binary_ext: ""
            archive_ext: tar.gz
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary_ext: ""
            archive_ext: tar.gz
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            binary_ext: ""
            archive_ext: tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            binary_ext: ".exe"
            archive_ext: zip
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Set archive name
        shell: bash
        run: echo "ARCHIVE_NAME=hepa-${RELEASE_TAG}-${{ matrix.target }}" >> "$GITHUB_ENV"
      - name: Build
        run: cargo build --release --locked -p hepa-cli --target ${{ matrix.target }}
      - name: Stage archive contents
        shell: bash
        run: |
          set -euo pipefail
          stage="dist/${ARCHIVE_NAME}"
          mkdir -p "$stage"
          cp "target/${{ matrix.target }}/release/hepa-cli${{ matrix.binary_ext }}" "$stage/hepa${{ matrix.binary_ext }}"
          cp README.md LICENSE "$stage/"
      - name: Package Unix archive
        if: matrix.archive_ext == 'tar.gz'
        shell: bash
        run: |
          set -euo pipefail
          cd dist
          tar -czf "${ARCHIVE_NAME}.tar.gz" "${ARCHIVE_NAME}"
          shasum -a 256 "${ARCHIVE_NAME}.tar.gz" > "${ARCHIVE_NAME}.tar.gz.sha256"
      - name: Package Windows archive
        if: matrix.archive_ext == 'zip'
        shell: pwsh
        run: |
          Compress-Archive -Path "dist/$env:ARCHIVE_NAME" -DestinationPath "dist/$env:ARCHIVE_NAME.zip"
          $hash = Get-FileHash "dist/$env:ARCHIVE_NAME.zip" -Algorithm SHA256
          "$($hash.Hash.ToLower())  $env:ARCHIVE_NAME.zip" | Out-File -FilePath "dist/$env:ARCHIVE_NAME.zip.sha256" -Encoding ascii
      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: hepa-${{ matrix.target }}
          path: |
            dist/hepa-*-${{ matrix.target }}.${{ matrix.archive_ext }}
            dist/hepa-*-${{ matrix.target }}.${{ matrix.archive_ext }}.sha256
          if-no-files-found: error

  publish:
    name: Publish GitHub Release assets
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Create checksum manifest
        run: |
          set -euo pipefail
          find dist -maxdepth 1 -type f \( -name '*.tar.gz' -o -name '*.zip' \) -print0 \
            | sort -z \
            | xargs -0 sha256sum > dist/SHA256SUMS.txt
      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          fail_on_unmatched_files: true
          files: |
            dist/*.tar.gz
            dist/*.zip
            dist/*.sha256
            dist/SHA256SUMS.txt
